name: Lean Verification

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lean-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lean-check:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Lean
        uses: leanprover-community/setup-lean@v1

      - name: Resolve pinned dependencies
        run: lake update

      - name: Download Mathlib build cache
        run: lake exe cache get

      - name: Kernel-check counterexample
        run: lake build Counterexample109
