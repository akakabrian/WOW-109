name: Lean Verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lean-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  lean-check:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pinned Lean environment
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: true

      - name: Kernel-check counterexample
        shell: bash
        run: |
          set -o pipefail
          lake build Counterexample109 2>&1 | tee lean-build.log

      - name: Upload Lean build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lean-build-log
          path: lean-build.log
          if-no-files-found: error
