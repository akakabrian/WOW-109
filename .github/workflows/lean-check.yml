name: Lean Verification

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lean-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  lean-check:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Kernel-check counterexample
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: true
          build-args: Counterexample109
          test: false
          lint: false
          use-mathlib-cache: true
          use-github-cache: true
